<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Check prepaid electricity meter data, recharge history, and usage analytics for NESCO and DESCO." />
    <meta name="color-scheme" content="light dark" />

    <script>
      (() => {
        let theme = 'system'
        try {
          const saved = localStorage.getItem('theme')
          if (saved === 'light' || saved === 'dark' || saved === 'system') theme = saved
        } catch {}

        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const isDark = theme === 'dark' || (theme === 'system' && prefersDark)
        document.documentElement.classList.toggle('dark', isDark)
        document.documentElement.style.backgroundColor = isDark ? '#1a1a1a' : '#f7f6f2'
      })()
    </script>
    <style>
      html { background: #f7f6f2; }
      html.dark { background: #1a1a1a; }
      body { background: #f7f6f2; }
      html.dark body { background: #1a1a1a; }
      #root { min-height: 100vh; }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BD Meter" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="BD Meter — NESCO & DESCO Prepaid Dashboard" />
    <meta property="og:description" content="Check prepaid electricity meter data, recharge history, and usage analytics for NESCO and DESCO." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bdmeter.netlify.app/" />
    <meta property="og:image" content="https://bdmeter.netlify.app/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BD Meter — Prepaid Meter Dashboard" />
    <meta name="twitter:description" content="Check NESCO & DESCO prepaid meter balance, recharge history, and analytics." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>BD Meter — NESCO & DESCO Prepaid Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
